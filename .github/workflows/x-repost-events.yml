name: X Repost Events

on:
  workflow_dispatch:
  # Automatic reposts are temporarily disabled while X posting credits are unavailable.
  # Manual execution via workflow_dispatch remains available.
  # schedule:
  #   # 00:00, 03:00, 06:00, 09:00, 12:00, 15:00, 18:00, 21:00 (UTC)
  #   - cron: "0 0,3,6,9,12,15,18,21 * * *"
  #   # 01:30, 04:30, 07:30, 10:30, 13:30, 16:30, 19:30, 22:30 (UTC)
  #   - cron: "30 1,4,7,10,13,16,19,22 * * *"

jobs:
  repost-latest-event:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BASE_URL: ${{ secrets.REALTIME_API_BASE_URL }}
      API_TOKEN: ${{ secrets.REALTIME_API_TOKEN }}
      INTERNAL_API_SIGNING_SECRET: ${{ secrets.INTERNAL_API_SIGNING_SECRET }}
      HASHTAG: "#謎チケ売ります"
    steps:
      - uses: actions/checkout@v4
      - name: Ensure configuration exists
        run: |
          if [ -z "$BASE_URL" ] || [ -z "$API_TOKEN" ]; then
            echo "Required secrets REALTIME_API_BASE_URL or REALTIME_API_TOKEN are missing." >&2
            exit 1
          fi
      - name: Invoke repost events API
        run: |
          PAYLOAD=$(jq -n --arg hashtag "$HASHTAG" '{hashtag: $hashtag, dryRun: false}')
          export RESPONSE_FILE=$(mktemp)
          HTTP_STATUS=$(scripts/internal-api/post.sh \
            "/api/internal/x/repost/events" \
            "$PAYLOAD" \
            2 10 || true)

          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -eq 204 ]; then
            echo "No candidate to repost (204). Treating as success."
            exit 0
          elif [ "$HTTP_STATUS" -eq 429 ]; then
            echo "Rate limited (429). Treating as success to avoid alert fatigue."
            cat "$RESPONSE_FILE"
            exit 0
          elif [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            cat "$RESPONSE_FILE"
            exit 0
          else
            echo "API call failed:"
            cat "$RESPONSE_FILE"
            exit 0
          fi
