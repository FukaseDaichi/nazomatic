name: Realtime Prune

on:
  workflow_dispatch:
  schedule:
    - cron: "15 0 * * *" # Daily at 00:15 UTC

jobs:
  trigger-prune:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Invoke realtime prune API
        env:
          BASE_URL: ${{ secrets.REALTIME_API_BASE_URL }}
          API_TOKEN: ${{ secrets.REALTIME_API_TOKEN }}
          INTERNAL_API_SIGNING_SECRET: ${{ secrets.INTERNAL_API_SIGNING_SECRET }}
        run: |
          if [ -z "$BASE_URL" ] || [ -z "$API_TOKEN" ]; then
            echo "Missing required secrets REALTIME_API_BASE_URL or REALTIME_API_TOKEN."
            exit 1
          fi

          scripts/internal-api/post.sh \
            "/api/internal/realtime/prune" \
            '{"cutoffDays":1,"dryRun":false}' \
            3 10
