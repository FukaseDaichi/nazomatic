name: Realtime Verify Post Visibility

on:
  workflow_dispatch:
  schedule:
    - cron: "10,45 * * * *" # Twice per hour at minutes 10 and 45

jobs:
  trigger-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Invoke realtime verify post visibility API
        env:
          BASE_URL: ${{ secrets.REALTIME_API_BASE_URL }}
          API_TOKEN: ${{ secrets.REALTIME_API_TOKEN }}
          INTERNAL_API_SIGNING_SECRET: ${{ secrets.INTERNAL_API_SIGNING_SECRET }}
        run: |
          if [ -z "$BASE_URL" ] || [ -z "$API_TOKEN" ]; then
            echo "Missing required secrets REALTIME_API_BASE_URL or REALTIME_API_TOKEN."
            exit 1
          fi

          export RESPONSE_FILE=$(mktemp)

          HTTP_STATUS=$(scripts/internal-api/post.sh \
            "/api/internal/realtime/verify-post-visibility" \
            '{"batchSize":10,"maxConcurrency":5,"bootstrapScanLimit":50,"dryRun":false}' \
            3 10 || true)

          echo "HTTP status: $HTTP_STATUS"
          cat "$RESPONSE_FILE"

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            exit 0
          fi

          echo ""
          echo "Request failed. REALTIME_API_BASE_URL should be the site origin, for example: https://nazomatic.vercel.app"
          exit 1
